<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Opening email app | Aron Blackburn</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <script>
    (function () {
      var theme = "dark";

      try {
        var savedTheme = localStorage.getItem("burnaronTheme") || localStorage.getItem("burnaronGridTheme");
        theme = savedTheme === "light" || savedTheme === "dark" ? savedTheme : "dark";
      } catch {}

      var isLight = theme === "light";
      document.documentElement.classList.add(isLight ? "theme-light" : "theme-dark");
      document.documentElement.classList.add(isLight ? "grid-theme-light" : "grid-theme-dark");

      try {
        if (sessionStorage.getItem("burnaronSiteEntered") === "true") {
          document.documentElement.classList.add("boot-seen", "preloader-seen");
        }
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=20260629d" />
  <link rel="stylesheet" href="css/theme-light.css?v=20260629d" />
</head>

<body>
  <main class="section">
    <div class="container contact-card">
      <p class="eyebrow">Email handoff</p>
      <h1>Opening your email app.</h1>
      <p>
        Your message is being prepared in your email client. Once it opens, review it and press send.
      </p>
      <div class="contact-actions">
        <a class="button primary" id="manualEmailLink" href="mailto:black@burnaron.com">Open email app</a>
        <a class="button ghost" href="https://burnaron.com/">Return to website</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; 2026 Aron Blackburn. Static portfolio utility page.</p>
      <a href="https://burnaron.com/">Return to website</a>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mailto = params.get("mailto");
    const manualEmailLink = document.querySelector("#manualEmailLink");

    if (mailto && mailto.startsWith("mailto:")) {
      manualEmailLink.href = mailto;

      window.setTimeout(() => {
        window.location.href = mailto;
      }, 250);
    }
  </script>
  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token":"6d30cd77187e40b19d858705036cf37a"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
